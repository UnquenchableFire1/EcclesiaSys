    <!-- Cache and Service Worker Clearing Script -->
    <script>
      // Force unregister all service workers and clear caches to resolve "blank page" issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Service Worker unregistered');
          }
        });
      }
      
      // Attempt to clear caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('Cache ' + name + ' deleted');
          }
        });
      }

      // Check for old hashed assets and force reload if missing
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        if (msg.includes('ERR_ABORTED') || msg.includes('404')) {
           console.log('Asset loading failed, clearing cache and reloading...');
           if (typeof window.location.reload === 'function') {
             window.location.reload(true);
           }
        }
        return false;
      };
    </script>
