<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0F766E" stroke="#14B8A6" stroke-width="2"/>
  
  <!-- Church building shape -->
  <g fill="#FFFFFF">
    <!-- Main building body -->
    <rect x="30" y="40" width="40" height="35" rx="2"/>
    
    <!-- Roof (triangle) -->
    <polygon points="30,40 50,20 70,40"/>
    
    <!-- Door -->
    <rect x="45" y="55" width="10" height="20" fill="#0F766E"/>
    
    <!-- Door handle -->
    <circle cx="54" cy="65" r="1.5" fill="#14B8A6"/>
    
    <!-- Left window -->
    <rect x="35" y="45" width="6" height="6" fill="#0F766E"/>
    <!-- Left window pane -->
    <line x1="38" y1="45" x2="38" y2="51" stroke="#14B8A6" stroke-width="0.5"/>
    <line x1="35" y1="48" x2="41" y2="48" stroke="#14B8A6" stroke-width="0.5"/>
    
    <!-- Right window -->
    <rect x="59" y="45" width="6" height="6" fill="#0F766E"/>
    <!-- Right window pane -->
    <line x1="62" y1="45" x2="62" y2="51" stroke="#14B8A6" stroke-width="0.5"/>
    <line x1="59" y1="48" x2="65" y2="48" stroke="#14B8A6" stroke-width="0.5"/>
    
    <!-- Cross on roof -->
    <g stroke="#14B8A6" stroke-width="1.5" stroke-linecap="round">
      <line x1="50" y1="22" x2="50" y2="32"/>
      <line x1="45" y1="27" x2="55" y2="27"/>
    </g>
  </g>
</svg>
