# Production Configuration for Render
spring.application.name=bbj-church-manager
server.port=${PORT:8080}
server.servlet.context-path=/

# Logging
logging.level.root=WARN
logging.level.com.example=INFO

# B2 File Upload Service Configuration (from environment variables)
b2.keyId=${B2_KEY_ID}
b2.applicationKey=${B2_APP_KEY}
b2.bucketName=bbj-church-media

# Upload Configuration
upload.maxSize=524288000
upload.dir=/tmp/uploads

# Production TiDB Cloud Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# SQL Initialization (auto-create schema and seed data)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true

# Hibernate DDL Auto - Update existing schema (don't drop/recreate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Multipart File Upload
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Email Configuration (Gmail SMTP) - Use environment variables for credentials
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Application Frontend URL (for password reset links, etc.)
app.frontend.url=${APP_FRONTEND_URL:https://yourbbjdigitalapp.onrender.com}

# JPA/Hibernate Configuration
spring.jpa.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS (handled in Application.java)
